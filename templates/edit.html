
<!DOCTYPE html>
<html>
<head>
    <title>Edit Blog</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h2>Edit Blog</h2>

<form method="POST">

Title:
<input 
type="text" 
name="title" 
value="{{ blog.title }}" 
required>

<br><br>

Content:

<textarea 
name="content" 
rows="8" 
required>{{ blog.content }}</textarea>

<br><br>

<button type="submit">Update Blog</button>

</form>


<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
