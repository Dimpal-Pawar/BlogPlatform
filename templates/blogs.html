
<!DOCTYPE html>
<html>
<head>
    <title>All Blogs</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h2>All Published Blogs</h2>


<form method="GET" action="/search">

<input 
type="text" 
name="q"
placeholder="Search blogs..."
required>

<button type="submit">
Search 🔍
</button>

</form>


<br>


{% for blog in blogs %}

<div class="blog-card">

<h3>{{ blog.title }}</h3>

<p>{{ blog.content }}</p>

<p>
Written by: {{ blog.username }}
</p>


<p>
❤️ Likes: {{ blog.likes }}
</p>


<a href="/like/{{ blog.id }}">
    <button>Like ❤️</button>
</a>


<hr>


<h4>Comments</h4>

{% for comment in comments %}

<p>
<b>{{ comment.username }}</b>:
{{ comment.comment }}
</p>

{% endfor %}


<form method="POST" action="/comment/{{ blog.id }}">

<input 
type="text"
name="comment"
placeholder="Write a comment..."
required>

<button type="submit">
Add Comment 💬
</button>

</form>


</div>

{% endfor %}


<a href="/dashboard">
Dashboard
</a>

<br><br>

<a href="/logout">
Logout
</a>


</div>

</body>
</html>
