
<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h2>My Profile 👤</h2>


<h3>Username:</h3>
<p>{{ user.username }}</p>


<h3>Email:</h3>
<p>{{ user.email }}</p>


<h3>Total Blogs:</h3>
<p>{{ blogs|length }}</p>


<hr>


<h3>My Blogs</h3>


{% for blog in blogs %}

<div class="blog-card">

<h3>{{ blog.title }}</h3>

<p>{{ blog.content }}</p>

</div>

{% endfor %}


<br>

<a href="/dashboard">
    <button>Back to Dashboard</button>
</a>


</div>

</body>
</html>
